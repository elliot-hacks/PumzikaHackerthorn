version: '3.8'

services:
  # Main Django Application
  web:
    build: .
    container_name: pumzika-web
    ports:
      - "8000:8000"
    environment:
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY:-pumzika-secret-key-change-in-production}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    volumes:
      - ./data:/app/data
      - static_volume:/app/staticfiles
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - pumzika-network

  # Celery Worker for async NLP processing
  worker:
    build: .
    container_name: pumzika-worker
    command: celery -A PumzikaHackerthorn worker --loglevel=info
    environment:
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY:-pumzika-secret-key-change-in-production}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    volumes:
      - ./data:/app/data
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - pumzika-network

  # Celery Beat for scheduled tasks
  beat:
    build: .
    container_name: pumzika-beat
    command: celery -A PumzikaHackerthorn beat --loglevel=info
    environment:
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY:-pumzika-secret-key-change-in-production}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - pumzika-network

  # Redis for Celery message broker
  redis:
    image: redis:7-alpine
    container_name: pumzika-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - pumzika-network

volumes:
  static_volume:
  redis_data:

networks:
  pumzika-network:
    driver: bridge